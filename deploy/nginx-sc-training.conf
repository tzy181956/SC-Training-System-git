server {
    listen 80;
    server_name _;

    # Replace server_name with your real domain after DNS is ready.
    # HTTPS should be configured separately in a later step.
    # Backend 8000 is for local Nginx upstream only and should not be exposed to the public internet.
    # Public internet deployments should also enable login rate limiting.
    # Add the zone below inside the global `http {}` block in /etc/nginx/nginx.conf:
    # limit_req_zone $binary_remote_addr zone=sc_training_login:10m rate=5r/m;

    root /opt/sc-training-system/frontend/dist;
    index index.html;

    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Example dedicated limiter for login requests.
    # Requires the `limit_req_zone` declaration above in the global `http {}` block.
    #
    # location = /api/auth/login {
    #     limit_req zone=sc_training_login burst=10 nodelay;
    #     limit_req_status 429;
    #     proxy_pass http://127.0.0.1:8000/api/auth/login;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
