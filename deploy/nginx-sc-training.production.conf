# Production template for public internet deployment.
# Before enabling this site, add the shared limiter inside the global `http {}` block
# in /etc/nginx/nginx.conf, otherwise `limit_req` below will fail validation:
#
#   limit_req_zone $binary_remote_addr zone=sc_training_login:10m rate=5r/m;
#
# After HTTPS is configured and verified, you may also enable HSTS:
#
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

server {
    listen 80;
    server_name your-domain.example;

    root /opt/sc-training-system/frontend/dist;
    index index.html;

    client_max_body_size 50m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /api/auth/login {
        limit_req zone=sc_training_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
