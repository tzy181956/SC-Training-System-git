name: Deploy Production

on:
  push:
    branches:
      - "服务器端"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHON_VERSION: "3.12"
      NODE_VERSION: "20"
      RELEASE_ARCHIVE: sc-training-release.tgz
      REMOTE_RELEASE_ARCHIVE: /tmp/sc-training-release.tgz
      REMOTE_DEPLOY_SCRIPT: /tmp/sc-training-deploy.sh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run checks and tests
        run: |
          set -euo pipefail
          python -m compileall backend/app backend/scripts
          python scripts/check_text_encoding.py
          if find backend -path backend/.venv -prune -o -path "*/tests/*.py" -print -quit | grep -q .; then
            python -m pip install pytest
            python -m pytest backend
          else
            echo "::notice::No backend pytest tests were found. Ran compileall and text encoding checks instead."
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Create release archive
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='backend/.venv' \
            --exclude='backend/training.db*' \
            --exclude='backend/*.db' \
            --exclude='backend/*.db-*' \
            --exclude='backend/*.sqlite3' \
            --exclude='backend/backups' \
            --exclude='frontend/node_modules' \
            --exclude='logs/*' \
            -czf "$RELEASE_ARCHIVE" .
          test -s "$RELEASE_ARCHIVE"

      - name: Validate deployment secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.SSH_HOST }}" || (echo "::error::Missing GitHub Secret: SSH_HOST" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "::error::Missing GitHub Secret: SSH_USER" && exit 1)
          test -n "${{ secrets.SSH_KEY }}" || (echo "::error::Missing GitHub Secret: SSH_KEY" && exit 1)
          test -n "${{ secrets.DEPLOY_PATH }}" || (echo "::error::Missing GitHub Secret: DEPLOY_PATH" && exit 1)

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive and deploy script
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          chmod +x scripts/deploy.sh
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" "$RELEASE_ARCHIVE" "$SSH_USER@$SSH_HOST:$REMOTE_RELEASE_ARCHIVE"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" scripts/deploy.sh "$SSH_USER@$SSH_HOST:$REMOTE_DEPLOY_SCRIPT"

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'sc-training-backend' }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL || 'http://127.0.0.1/health' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' SERVICE_NAME='$SERVICE_NAME' HEALTHCHECK_URL='$HEALTHCHECK_URL' bash '$REMOTE_DEPLOY_SCRIPT' '$REMOTE_RELEASE_ARCHIVE'"
